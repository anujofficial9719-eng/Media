version: "3.9"

services:
  bot:
    build: .
    restart: always
    env_file: .env
    volumes:
      - ./downloads:/app/downloads
      - ./assets:/app/assets
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
